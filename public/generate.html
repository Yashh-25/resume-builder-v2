<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Resume</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#F8F7FF;
    padding:30px;
}

/* BACKGROUND BLOBS */
body::before, body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(100px);
    z-index:-1;
}
body::before{
    background:#7C3AED;
    top:-100px;
    left:-100px;
}
body::after{
    background:#06B6D4;
    bottom:-100px;
    right:-100px;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(20px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(124,58,237,0.12);
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.avatar{
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(135deg,#7C3AED,#06B6D4);
}

h2{
    font-size:24px;
    font-weight:700;
    color:#1E1B4B;
}

/* 🔥 FIXED TEXTAREA */
#userComment{
    width:100%;
    height:100px;
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    border:2px solid #7C3AED;   /* strong visible border */
    background:#FFFFFF;         /* clear white */
    outline:none;
    font-size:14px;
}

#userComment::placeholder{
    color:#000000;
}

/* LABEL */
.label{
    font-size:14px;
    font-weight:600;
    color:#374151;
    margin-top:10px;
}

/* BUTTON */
button{
    padding:12px 18px;
    background:linear-gradient(135deg,#7C3AED,#8B5CF6);
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-top:15px;
    font-weight:600;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(124,58,237,0.3);
}

/* SEARCH BAR */
.keyword-bar{
    margin-top:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

.keyword-bar input{
    padding:10px;
    width:60%;
    border-radius:10px;
    border:1px solid #ddd;
}

/* OUTPUT */
#output{
    margin-top:20px;
    white-space:pre-wrap;
    background:#F9FAFB;
    padding:15px;
    border-radius:12px;
    border:1px solid #eee;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader" style="
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(255,255,255,0.7);
backdrop-filter: blur(8px);
display: none;
justify-content: center;
align-items: center;
flex-direction: column;
z-index: 999;">
    <h2 id="timerText">Processing...</h2>
</div>

<div class="container">

    <div class="header">
        <div class="avatar"></div>
        <h2>Step 3: Generate Resume</h2>
    </div>

    <!-- ✅ NOW CLEARLY VISIBLE -->
    <div class="label">Special Instructions</div>
    <textarea 
        id="userComment" 
        placeholder="Add any special instructions (e.g. focus more on SAP, keep language simple, highlight leadership, etc.)">
    </textarea>

    <button onclick="generateResume()">Generate Resume</button>

    <div class="keyword-bar">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Search keyword (e.g. SAP)">
        <button onclick="searchKeyword()">Search</button>
        <span id="countResult"></span>
    </div>

    <div id="output"></div>

    <button onclick="downloadDoc()">Download Word File</button>

</div>

<script>
let originalResume = "";

async function generateResume() {

    const timeline = localStorage.getItem("timelineData");
    const keywords = JSON.parse(localStorage.getItem("keywords"));
    const userComment = document.getElementById("userComment").value;

    startLoader(60, "Generating Resume...");

    const res = await fetch("http://localhost:5000/generate-resume", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ timeline, keywords, userComment })
    });

    const data = await res.json();

    stopLoader();

    originalResume = data.resume;
    document.getElementById("output").innerText = originalResume;
}

function searchKeyword() {
    const keyword = document.getElementById("searchInput").value.trim();
    if (!keyword) return;

    const regex = new RegExp(`(${keyword})`, "gi");

    const matches = originalResume.match(regex);
    const count = matches ? matches.length : 0;

    const highlighted = originalResume.replace(
        regex,
        `<span style="background: yellow; font-weight: bold;">$1</span>`
    );

    document.getElementById("output").innerHTML = highlighted;
    document.getElementById("countResult").innerText = `Count: ${count}`;
}

document.getElementById("searchInput").addEventListener("input", function () {
    if (this.value === "") {
        document.getElementById("output").innerText = originalResume;
        document.getElementById("countResult").innerText = "";
    }
});

function startLoader(seconds, message) {
    const loader = document.getElementById("loader");
    const text = document.getElementById("timerText");

    loader.style.display = "flex";

    let time = seconds;

    text.innerText = `${message} (${time}s)`;

    const interval = setInterval(() => {
        time--;
        text.innerText = `${message} (${time}s)`;
        if (time <= 0) clearInterval(interval);
    }, 1000);
}

function stopLoader() {
    document.getElementById("loader").style.display = "none";
}

function downloadDoc() {
    const blob = new Blob([originalResume], {
        type: "application/msword"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "resume.doc";
    a.click();

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
